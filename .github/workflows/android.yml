name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # هذه هي الخطوة التي كانت تنقصنا، فهي تجهز البيئة بشكل احترافي
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Wrapper and Build
        run: |
          # سنستخدم إصدار 8.2 ليتوافق مع ملفات الـ build.gradle التي أنشأناها
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
