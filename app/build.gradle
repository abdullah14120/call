plugins {
    id 'com.android.application'
    // 1. إضافة جلب خدمات جوجل (ضروري لـ Firebase)
    id 'com.google.gms.google-services' 
}

android {
    namespace 'com.cdma.gsm.call'
    compileSdk 34

    defaultConfig {
        applicationId "com.cdma.gsm.call"
        minSdk 24 
        targetSdk 34
        versionCode 1
        versionName "2.0-Cloud" // تحديث النسخة للإصدار السحابي

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // المكتبات الأساسية
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    
    // 2. مكتبة CardView (ضرورية لواجهة activity_main الجديدة)
    implementation 'androidx.cardview:cardview:1.0.0'

    // 3. مكتبات Firebase (قلب النظام السحابي)
    // استيراد منصة Firebase BoM لضمان توافق النسخ
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-database' // قاعدة البيانات اللحظية
    implementation 'com.google.firebase:firebase-analytics' // اختياري للتقارير

    implementation 'androidx.core:core:1.12.0'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
